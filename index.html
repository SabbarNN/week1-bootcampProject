<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name = "viewport" content = "width = device-width, initial-scale=1.0">
<title>Built by Me, Natal</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="card">
        <h1>JD Bank Bill Splitter</h1>
        <div class="field">
            <label for="bill">Bill amount ($)</label>
            <input type="number" id="bill" placeholder="0.00" min="0" step = "0.01">
        </div>

        <div id="error-message" style="color: red; font-size: 0.85rem; margin-top: 0.5rem;"> </div>

        <div class="field">
            <label>
                Tip %
            <div class="tip-buttons">
                <button type="button" class="tip-btn" data-tip="0">No Tip</button>
                <button type="button" class="tip-btn" data-tip="10">10%</button>
                <button type="button" class="tip-btn" data-tip="15">15%</button>
                <button type="button" class="tip-btn" data-tip="18">18%</button>
                <button type="button" class="tip-btn" data-tip="20">20%</button>
                <button type="button" class="tip-btn" data-tip="25">25%</button>
            </div>
            </label>
        </div>

        <div class="field">
            <label for="custom-tip"> Custom Tip ($)</label>
            <input type="number" id="custom-tip" placeholder="0.00" min="0" step = "1">
        </div>

        <div class="field">
            <label for="people">Split between</label>
            <input type="number" id="people" value="1" min="1" step="1">
        </div>

        <div class="results">
            <div class="result-row">
                <span>Tip amount</span>
                <span id="tip-amount">$0.00</span>
            </div>
            <div class="result-row">
                <span>Total</span>
                <span id="total-amount">$0.00</span>
            </div>
            <div class="result-row grand">
                <span>Per person</span>
                <span id="per-person">$0.00</span>
            </div>
            <div class="result-row">
                <span>Extra tip</span>
                <span id="extra-tip">$0.00</span>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
